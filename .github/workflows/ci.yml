name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/Fleece.Core.Tests/Fleece.Core.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=core-tests.trx" --results-directory ./TestResults

      - name: Run CLI composition tests
        run: dotnet test tests/Fleece.Cli.Tests/Fleece.Cli.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=cli-tests.trx" --results-directory ./TestResults

      - name: Run CLI E2E scenario tests (mock FS)
        run: dotnet test tests/Fleece.Cli.E2E.Tests/Fleece.Cli.E2E.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=cli-e2e-tests.trx" --results-directory ./TestResults

      - name: Run CLI integration tests (real FS + git)
        run: dotnet test tests/Fleece.Cli.Integration.Tests/Fleece.Cli.Integration.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=cli-integration-tests.trx" --results-directory ./TestResults

      - name: CLI smoke test
        run: |
          dotnet run --project src/Fleece.Cli --no-build --configuration Release -- --help
          dotnet run --project src/Fleece.Cli --no-build --configuration Release -- list --json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx
